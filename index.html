<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dual N-Back</title>

<style>
body {
  margin: 0;
  text-align: center;
  font-family: Arial, sans-serif;
  background: #050505;
  color: white;
}

#flashLeft, #flashRight {
  position: fixed;
  top: 0;
  width: 50%;
  height: 100%;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.25s ease;
  z-index: 1;
}

#flashLeft { left: 0; }
#flashRight { right: 0; }

.flashCorrect {
  background: rgba(34, 197, 94, 0.28);
  opacity: 1 !important;
}

.flashWrong {
  background: rgba(239, 68, 68, 0.28);
  opacity: 1 !important;
}

.container {
  position: relative;
  z-index: 2;
  padding-top: 25px;
}

.controls {
  margin: 20px;
}

select, button {
  font-size: 18px;
  padding: 10px;
  margin: 6px;
  border-radius: 10px;
  border: none;
}

button {
  cursor: pointer;
}

#grid {
  display: grid;
  grid-template-columns: repeat(3, 110px);
  gap: 14px;
  justify-content: center;
  margin-top: 25px;
}

.cell {
  width: 110px;
  height: 110px;
  background: #111;
  border: 3px solid #777;
  border-radius: 15px;
}

.active {
  background: #2563eb;
  box-shadow: 0 0 25px #2563eb;
}

#feedback {
  font-size: 26px;
  font-weight: bold;
  margin-top: 20px;
  min-height: 35px;
}

.correcto { color: #22c55e; }
.incorrecto { color: #ef4444; }
.info { color: #60a5fa; }

#resultado {
  font-size: 18px;
  margin-top: 15px;
  white-space: pre-line;
}
</style>
</head>

<body>

<div id="flashLeft"></div>
<div id="flashRight"></div>

<div class="container">

<h1>Dual N-Back</h1>
<p><b>A</b> = sonido / izquierda | <b>D</b> = posición / derecha</p>

<div class="controls">
  <label>Nivel:</label>
  <select id="nivel">
    <option value="1">1-Back</option>
    <option value="2">2-Back</option>
    <option value="3">3-Back</option>
  </select>

  <label>Tiempo:</label>
  <select id="tiempo">
    <option value="1200">1.2 s</option>
    <option value="1500" selected>1.5 s</option>
    <option value="2000">2 s</option>
    <option value="3000">3 s</option>
  </select>

  <br>

  <button onclick="iniciar()">Iniciar</button>
  <button onclick="responderAudio()">A - Sonido</button>
  <button onclick="responderVisual()">D - Posición</button>
</div>

<div id="grid">
  <div class="cell"></div><div class="cell"></div><div class="cell"></div>
  <div class="cell"></div><div class="cell"></div><div class="cell"></div>
  <div class="cell"></div><div class="cell"></div><div class="cell"></div>
</div>

<div id="feedback"></div>
<p id="resultado">Presiona iniciar para comenzar.</p>

</div>

<script>
const cells = document.querySelectorAll(".cell");
const letras = ["A", "B", "C", "D", "E", "F", "G", "H"];

let secuenciaVisual = [];
let secuenciaAudio = [];
let indice = 0;
let nivel = 1;
let tiempo = 1500;
let maxEnsayos = 20;
let pruebaActiva = false;

let visualAciertos = 0;
let visualComision = 0;
let visualOmision = 0;

let audioAciertos = 0;
let audioComision = 0;
let audioOmision = 0;

let respondioVisual = false;
let respondioAudio = false;

let inicioEstimulo = 0;
let trVisual = [];
let trAudio = [];

function iniciar() {
  nivel = parseInt(document.getElementById("nivel").value);
  tiempo = parseInt(document.getElementById("tiempo").value);

  secuenciaVisual = [];
  secuenciaAudio = [];
  indice = 0;
  pruebaActiva = true;

  visualAciertos = 0;
  visualComision = 0;
  visualOmision = 0;

  audioAciertos = 0;
  audioComision = 0;
  audioOmision = 0;

  trVisual = [];
  trAudio = [];

  generarSecuencias();

  document.getElementById("feedback").innerText = "";
  document.getElementById("resultado").innerText = "Prueba iniciada...";
  mostrarEstimulo();
}

function generarSecuencias() {
  for (let i = 0; i < maxEnsayos; i++) {
    let posicion;
    let letra;

    if (i >= nivel && Math.random() < 0.3) {
      posicion = secuenciaVisual[i - nivel];
    } else {
      posicion = Math.floor(Math.random() * 9);
    }

    if (i >= nivel && Math.random() < 0.3) {
      letra = secuenciaAudio[i - nivel];
    } else {
      letra = letras[Math.floor(Math.random() * letras.length)];
    }

    secuenciaVisual.push(posicion);
    secuenciaAudio.push(letra);
  }
}

function mostrarEstimulo() {
  if (indice >= maxEnsayos) {
    finalizar();
    return;
  }

  cells.forEach(c => c.classList.remove("active"));

  let posicionActual = secuenciaVisual[indice];
  let letraActual = secuenciaAudio[indice];

  cells[posicionActual].classList.add("active");
  hablar(letraActual);

  respondioVisual = false;
  respondioAudio = false;
  inicioEstimulo = Date.now();

  document.getElementById("feedback").innerText = "";

  document.getElementById("resultado").innerText =
    "Ensayo " + (indice + 1) + " de " + maxEnsayos + "\n" +
    "A = sonido | D = posición";

  setTimeout(() => {
    evaluarSinRespuesta();
    indice++;
    mostrarEstimulo();
  }, tiempo);
}

function hablar(letra) {
  speechSynthesis.cancel();

  let voz = new SpeechSynthesisUtterance(letra);
  voz.lang = "es-MX";
  voz.rate = 0.8;
  voz.pitch = 1;

  speechSynthesis.speak(voz);
}

function coincideVisual() {
  if (indice < nivel) return false;
  return secuenciaVisual[indice] === secuenciaVisual[indice - nivel];
}

function coincideAudio() {
  if (indice < nivel) return false;
  return secuenciaAudio[indice] === secuenciaAudio[indice - nivel];
}

function mostrarFeedback(texto, tipo) {
  const feedback = document.getElementById("feedback");
  feedback.innerText = texto;
  feedback.className = tipo;
}

function flashLado(lado, correcto) {
  let panel = lado === "izquierda"
    ? document.getElementById("flashLeft")
    : document.getElementById("flashRight");

  panel.className = correcto ? "flashCorrect" : "flashWrong";

  setTimeout(() => {
    panel.className = "";
  }, 350);
}

function responderAudio() {
  if (!pruebaActiva || respondioAudio || indice >= maxEnsayos) return;

  respondioAudio = true;
  trAudio.push(Date.now() - inicioEstimulo);

  if (coincideAudio()) {
    audioAciertos++;
    mostrarFeedback("A presionada: sonido CORRECTO", "correcto");
    flashLado("izquierda", true);
  } else {
    audioComision++;
    mostrarFeedback("A presionada: sonido INCORRECTO", "incorrecto");
    flashLado("izquierda", false);
  }
}

function responderVisual() {
  if (!pruebaActiva || respondioVisual || indice >= maxEnsayos) return;

  respondioVisual = true;
  trVisual.push(Date.now() - inicioEstimulo);

  if (coincideVisual()) {
    visualAciertos++;
    mostrarFeedback("D presionada: posición CORRECTA", "correcto");
    flashLado("derecha", true);
  } else {
    visualComision++;
    mostrarFeedback("D presionada: posición INCORRECTA", "incorrecto");
    flashLado("derecha", false);
  }
}

function evaluarSinRespuesta() {
  if (!respondioVisual && coincideVisual()) {
    visualOmision++;
  }

  if (!respondioAudio && coincideAudio()) {
    audioOmision++;
  }
}

function finalizar() {
  pruebaActiva = false;
  cells.forEach(c => c.classList.remove("active"));

  let totalVisual = secuenciaVisual.filter((pos, i) => {
    return i >= nivel && pos === secuenciaVisual[i - nivel];
  }).length;

  let totalAudio = secuenciaAudio.filter((letra, i) => {
    return i >= nivel && letra === secuenciaAudio[i - nivel];
  }).length;

  let precisionVisual = totalVisual > 0
    ? ((visualAciertos / totalVisual) * 100).toFixed(1)
    : 0;

  let precisionAudio = totalAudio > 0
    ? ((audioAciertos / totalAudio) * 100).toFixed(1)
    : 0;

  let promedioVisual = trVisual.length > 0
    ? Math.round(trVisual.reduce((a, b) => a + b, 0) / trVisual.length)
    : "Sin respuestas";

  let promedioAudio = trAudio.length > 0
    ? Math.round(trAudio.reduce((a, b) => a + b, 0) / trAudio.length)
    : "Sin respuestas";

  document.getElementById("feedback").innerText = "Prueba terminada";
  document.getElementById("feedback").className = "info";

  document.getElementById("resultado").innerText =
    "Nivel: " + nivel + "-Back\n" +
    "Ensayos: " + maxEnsayos + "\n\n" +

    "SONIDO / A / IZQUIERDA\n" +
    "Coincidencias reales: " + totalAudio + "\n" +
    "Aciertos: " + audioAciertos + "\n" +
    "Errores por comisión: " + audioComision + "\n" +
    "Errores por omisión: " + audioOmision + "\n" +
    "Precisión sonido: " + precisionAudio + "%\n" +
    "TR sonido promedio: " + promedioAudio + " ms\n\n" +

    "POSICIÓN / D / DERECHA\n" +
    "Coincidencias reales: " + totalVisual + "\n" +
    "Aciertos: " + visualAciertos + "\n" +
    "Errores por comisión: " + visualComision + "\n" +
    "Errores por omisión: " + visualOmision + "\n" +
    "Precisión posición: " + precisionVisual + "%\n" +
    "TR posición promedio: " + promedioVisual + " ms";
}

document.addEventListener("keydown", function(event) {
  const tecla = event.key.toLowerCase();

  if (tecla === "a") {
    responderAudio();
  }

  if (tecla === "d") {
    responderVisual();
  }
});
</script>

</body>
</html>
