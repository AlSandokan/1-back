<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pacientes</title>

<style>
*{ box-sizing:border-box; }

body{
    margin:0;
    background:
        radial-gradient(circle at top left,#1f2937,transparent 35%),
        linear-gradient(135deg,#030303,#101010);
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    min-height:100vh;
}

.contenedor{
    max-width:1200px;
    margin:auto;
    padding:50px 40px;
}

.encabezado{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:28px;
}

h1{
    font-size:46px;
    font-weight:300;
    margin:0;
}

.buscador{
    width:320px;
    padding:13px 16px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,0.18);
    background:rgba(255,255,255,0.07);
    color:white;
}

.lista{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:18px;
}

.tarjeta{
    background:rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.14);
    border-radius:22px;
    padding:22px;
    min-height:185px;
    box-shadow:0 18px 45px rgba(0,0,0,0.28);
    transition:0.25s;
}

.tarjeta:hover{
    transform:translateY(-4px);
    border-color:rgba(255,255,255,0.32);
}

.nombre{
    font-size:22px;
    font-weight:bold;
    margin-bottom:8px;
}

.info{
    color:#b8b8b8;
    font-size:14px;
    margin-top:6px;
    line-height:1.35;
}

button{
    margin-top:16px;
    padding:11px 18px;
    border:none;
    border-radius:999px;
    background:white;
    color:black;
    cursor:pointer;
    font-size:14px;
}

@media(max-width:700px){
    .contenedor{
        padding:32px 20px;
    }

    .encabezado{
        flex-direction:column;
        align-items:flex-start;
        gap:18px;
    }

    .buscador{
        width:100%;
    }
}
</style>
    
</head>

<body>

<div class="contenedor">

<div class="encabezado">
    <h1>📁 Pacientes</h1>

    <input
        class="buscador"
        id="buscadorPacientes"
        placeholder="Buscar paciente..."
    >
</div>

<div id="listaPacientes" class="lista">
    <p style="color:#999;">Cargando pacientes...</p>
</div>

</div>

<script type="module" src="js/pacientes.js"></script>

</body>
</html>
