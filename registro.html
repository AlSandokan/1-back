<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro | Cognición</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/registro.css">
</head>

<body>

<div class="auth-container">
  <div class="auth-card">
    <h1>Crear cuenta</h1>
    <p>Registro de paciente en Cognición</p>

    <input id="nombre" type="text" placeholder="Nombre completo">
    <input id="email" type="email" placeholder="Correo electrónico">
    <input id="password" type="password" placeholder="Contraseña">

    <button id="btnCrearCuenta">Crear cuenta</button>

    <button class="btn-secundario" onclick="window.location.href='login.html'">
      Ya tengo cuenta
    </button>

    <p id="mensaje"></p>
  </div>
</div>

<script type="module" src="js/registro.js"></script>

</body>
</html>
